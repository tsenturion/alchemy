<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=480, initial-scale=0.8, minimum-scale=0.35, maximum-scale=5.0, user-scalable=yes">
    <meta name="github-repository" content="tsenturion/alchemy">
    <title>Алхимические Эффекты</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="controls">
        <div class="button-group">
            <button id="menu-btn" type="button">Выбрать Эффект</button>
            <div class="menu" id="effects-menu"></div>
            <button id="addons-btn" type="button">Дополнения</button>
            <div class="menu addons-menu" id="addons-menu">
                <div class="addons-list" id="addons-list"></div>
            </div>
            <button id="back-btn" type="button">Назад</button>
        </div>
        <div class="search-group">
            <span class="visible-count" id="visible-count">0</span>
            <input type="text" id="search" placeholder="Поиск по названию..." autocomplete="off" />
        </div>
    </div>

    <div class="table-title" id="selection-title" style="display: none;">Вы выбрали</div>
    <table id="selection-table" style="display: none;">
        <thead>
            <tr>
                <th>
                    <div class="selected-header-content">
                        <span>Название</span>
                        <button id="remove-all-btn" type="button">Удалить все</button>
                    </div>
                </th>
                <th>Эффект 1</th>
                <th>Эффект 2</th>
                <th>Эффект 3</th>
                <th>Эффект 4</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div class="table-title" id="combination-title" style="display: none;"></div>
    <table id="combination-table" style="display: none;">
        <thead>
            <tr>
                <th>Название</th>
                <th>Эффект 1</th>
                <th>Эффект 2</th>
                <th>Эффект 3</th>
                <th>Эффект 4</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div class="table-title effect-title" id="effect-title" style="display: none;">
        <span id="effect-title-text"></span>
        <button id="effect-back-btn" type="button">Назад</button>
    </div>
    <table id="data-table">
        <thead>
            <tr>
                <th>Название</th>
                <th>Эффект 1</th>
                <th>Эффект 2</th>
                <th>Эффект 3</th>
                <th>Эффект 4</th>
            </tr>
            <tr id="main-hint-row">
                <th class="brew-hint-cell">
                    <div class="brew-hint-row">
                        <span class="brew-hint-poison">Для варки яда</span>
                        <span class="brew-hint-potion">Для варки зелья</span>
                    </div>
                </th>
                <th class="main-hint-effects" colspan="4">Выберите эффект чтобы посмотреть все ингридиенты</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="src/app.js"></script>
</body>
</html>
