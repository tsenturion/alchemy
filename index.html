<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="github-repository" content="tsenturion/alchemy">
    <title>Алхимические Эффекты</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="controls">
        <div class="button-group">
            <button id="menu-btn" type="button">Выбрать Эффект</button>
            <div class="menu" id="effects-menu"></div>
            <button id="addons-btn" type="button">Дополнения</button>
            <div class="menu addons-menu" id="addons-menu">
                <div class="addons-list" id="addons-list"></div>
            </div>
            <button id="back-btn" type="button">Назад</button>
        </div>
        <div class="search-group">
            <span class="visible-count" id="visible-count">0</span>
            <input type="text" id="search" placeholder="Поиск по названию..." autocomplete="off" />
        </div>
    </div>

    <!-- Таблица выбора -->
    <table id="selection-table" style="display: none;">
        <thead>
            <tr>
                <th>Название <button id="remove-all-btn" type="button">Удалить все</button></th>
                <th>Эффект 1</th>
                <th>Эффект 2</th>
                <th>Эффект 3</th>
                <th>Эффект 4</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <table id="combination-table" style="display: none;">
        <thead>
            <tr>
                <th>Название</th>
                <th>Эффект 1</th>
                <th>Эффект 2</th>
                <th>Эффект 3</th>
                <th>Эффект 4</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <table id="data-table">
        <thead>
            <tr>
                <th>Название</th>
                <th>Эффект 1</th>
                <th>Эффект 2</th>
                <th>Эффект 3</th>
                <th>Эффект 4</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="src/app.js"></script>
</body>
</html>
